<!DOCTYPE html>
<html>
<head>
    <title>Edit Employee</title>

    <style>
        body {
            font-family: Arial;
            padding: 20px;
            background: #f4f6f9;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 8px;
            max-width: 500px;
            margin: auto;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-top: 10px;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        .actions {
            margin-top: 20px;
            display: flex;
            justify-content: space-between;
        }

        .btn {
            padding: 8px 14px;
            border: none;
            cursor: pointer;
            border-radius: 6px;
            color: white;
            text-decoration: none;
        }

        .btn-save {
            background: #28a745;
        }

        .btn-back {
            background: #007bff;
        }
    </style>
</head>

<body>

<div class="card">

    <h2>Edit Employee</h2>

    <form method="POST">

        <label>Employee Name</label>
        <input type="text" name="EmployeeName" value="{{ emp.EmployeeName }}" required>

        <label>ID Number</label>
        <input type="text" name="ID_Number" value="{{ emp.ID_Number }}" required>

        <label>Phone</label>
        <input type="text" name="phone" value="{{ emp.phone }}" required>

        <label>Salary</label>
        <input type="number" step="0.01" name="salary" value="{{ emp.salary }}" required>

        <label>Role</label>
        <input type="text" name="role" value="{{ emp.role }}" required>

        <div class="actions">
            <a href="/Employees" class="btn btn-back">⬅ Back</a>

            <button type="submit" class="btn btn-save">
                💾 Save Changes
            </button>
        </div>

    </form>

</div>

</body>
</html>
