<!DOCTYPE html>
<html>
<head>
    <title>My Farm | cow_registry</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f2f6f9;
            margin: 0;
            padding: 0;
        }

        .container {
            width: 400px;
            margin: 80px auto;
            background: #ffffff;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            color: #2c3e50;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 12px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 14px;
        }

        button {
            width: 100%;
            margin-top: 20px;
            padding: 12px;
            background: #2c7be5;
            border: none;
            color: white;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #1a68d1;
        }
         .btn_dashboard {
            display: inline-block;
            margin-bottom: 15px;
            padding: 8px 14px;
            background: green;
            color: white;
            text-decoration: none;
            border-radius: 4px;}
    </style>
</head>
<body>

<div class="container">
    <a href="/cow_dashboard" class="btn_dashboard">← Back</a>
    <h2>Cow Registry</h2>
{% if message %}
<p style="color:#1500ff; font-weight:bold;">{{ message }}</p>
{% endif %}

    <form method="POST" action="/cow_registry">
        <input type="text" name="name" placeholder="cow name" required>
        <input type="text" name="breed" placeholder="breed type" required>
        <input type="date" name="dob" placeholder="date of birth">
        <input type="text" name="mother" placeholder="mother">
        
    <label>Category:</label><br>
    <select name="category" required>
        <option value="Milker">Milker</option>
        <option value="Steamer">Steamer</option>
        <option value="Dry">Dry</option>
        <option value="Incalf-Heifer">Incalf-Heifer</option>
        <option value="Bullying-Heifer">Bullying-Heifer</option>
        <option value="nolonger_exist">nolonger_exist</option>
        <option value="bull">bul</option>
    </select><br><br>
        <button type="submit">Submit</button>
    </form>

</div>

</body>
</html>
