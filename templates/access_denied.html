<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Access Denied</title>

<style>

body{
    margin:0;
    padding:0;
    font-family:'Segoe UI', Arial, sans-serif;
    background:linear-gradient(to right, #eef2f7, #dfe7f2);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    background:white;
    padding:40px;
    border-radius:15px;
    text-align:center;
    width:90%;
    max-width:450px;
    box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

.icon{
    font-size:70px;
    color:red;
    margin-bottom:15px;
}

h1{
    color:#dc3545;
    margin-bottom:10px;
}

p{
    color:#555;
    line-height:1.6;
    margin-bottom:25px;
}

.btn{
    display:inline-block;
    padding:12px 20px;
    background:#007bff;
    color:white;
    text-decoration:none;
    border-radius:6px;
    transition:0.3s;
    font-weight:600;
}

.btn:hover{
    background:#0056b3;
}

</style>

</head>

<body>

<div class="container">

    <div class="icon">
        ⛔
    </div>

    <h1>Access Denied</h1>

    <p>
        You are not authorized to access this page or module.
    </p>

    <a href="{{ url_for('main_dashboard') }}" class="btn">
        Back To Dashboard
    </a>

</div>

</body>

</html>
