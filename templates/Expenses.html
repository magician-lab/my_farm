<!DOCTYPE html>
<html>
<head>
    <title>Expenses List</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        table, th, td {
            border: 1px solid black;
        }

        th, td {
            padding: 8px;
            text-align: center;
        }

        th {
            background-color: #f2f2f2;
        }

        .btn-delete {
            margin-top: 10px;
            padding: 8px 15px;
            background-color: red;
            color: white;
            border: none;
            cursor: pointer;
        }

        .btn-delete:hover {
            background-color: darkred;
        }
         .btn_dashboard {
            display: inline-block;
            margin-bottom: 15px;
            padding: 8px 14px;
            background: green;
            color: white;
            text-decoration: none;
            border-radius: 4px;}

    </style>
</head>
<body>
      
    <h2>Incurred Expenses</h2>
    <p>Today's Date: {{ current_date }}</p>

    <form method="POST">
        <a href="/admin" class="btn_dashboard">← Back to Admin</a>
        <a href="/expense_registry" class="btn_dashboard">Add Expense</a>
        <button type="submit" name="delete_selected" class="btn-delete">
            Delete Selected
        </button>
        <table>
            <thead>
                <tr>
                    <th>Select</th>
                    <th>Expense Name</th>
                    <th>Description</th>
                    <th>Date Incurred</th>
                    <th>Cost</th>
                </tr>
            </thead>

            <tbody>
                {% for Expense in Expenses %}
                <tr>
                    <td>
                        <input type="checkbox" name="ExpensesRegistry_ids" value="{{ Expense.id }}">
                    </td>
                    <td>{{ Expense.ExpenseName }}</td>
                    <td>{{ Expense.Description }}</td>
                    <td>{{ Expense.Incurred_date }}</td>
                    <td>{{ "{:,}".format(Expense.cost) }}</td>
                    
                </tr>
                {% endfor %}
            </tbody>
        </table>



    </form>

</body>
</html>
