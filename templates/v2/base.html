<!DOCTYPE html>
<html>
<head>
    <title>Feeds System</title>

    <style>
        body {
            font-family: Arial;
            background: #f4f6f9;
            margin: 0;
        }

        .nav {
            background: #2c3e50;
            color: white;
            padding: 15px;
            font-size: 18px;
        }

        .container {
            padding: 20px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: #34495e;
            color: white;
            padding: 10px;
        }

        td {
            padding: 10px;
            border-bottom: 1px solid #ddd;
        }

        .badge {
            padding: 5px 10px;
            border-radius: 5px;
            color: white;
        }

        .green { background: #27ae60; }
        .red { background: #e74c3c; }
        .orange { background: #f39c12; }

        .btn {
            padding: 6px 10px;
            border-radius: 5px;
            text-decoration: none;
            color: white;
        }

        .btn-blue { background: #3498db; }
        .btn-green { background: #27ae60; }
        .btn-red { background: #e74c3c; }

        input, select {
            width: 100%;
            padding: 8px;
            margin-bottom: 10px;
        }
    </style>
</head>

<body>

</div>
<div class="nav">Feeds Management</div>
<div style="margin-bottom:15px;">

<div class="container">
    {% block content %}{% endblock %}
</div>

</body>
</html>
