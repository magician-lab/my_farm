<!DOCTYPE html>
<html>
<head>
<title>Edit Treatment</title>

<style>

body{
    font-family: Arial;
    background:#f4f6f9;
    padding:40px;
}

h2{
    text-align:center;
    color:#2c3e50;
}

form{
    max-width:450px;
    margin:auto;
    background:white;
    padding:25px;
    border-radius:10px;
    box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

label{
    font-weight:bold;
    margin-top:10px;
    display:block;
}

input, select{
    width:100%;
    padding:8px;
    margin-top:5px;
    border-radius:5px;
    border:1px solid #ccc;
}

button{
    margin-top:20px;
    width:100%;
    padding:10px;
    background:#27ae60;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#219150;
}

.back{
    display:block;
    text-align:center;
    margin-top:15px;
    text-decoration:none;
    color:#3498db;
}

</style>
</head>

<body>

<h2>✏️ Edit Treatment</h2>

<form method="POST">

<label>Cost</label>
<input type="number" step="0.01" name="cost" value="{{ rec.cost }}" required>

<label>Status</label>
<select name="status">
    <option value="recovering" {% if rec.status == "recovering" %}selected{% endif %}>Recovering</option>
    <option value="healed" {% if rec.status == "healed" %}selected{% endif %}>Healed</option>
</select>

<button type="submit">Update Record</button>

</form>

<a href="{{ url_for('treatment') }}" class="back">← Back to Records</a>

</body>
</html>
