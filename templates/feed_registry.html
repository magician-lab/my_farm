<!DOCTYPE html>
<html>
<head>
    <title>My Farm | Feeds Registry</title>

    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(to right, #eef2f7, #e3e9f0);
            margin: 0;
            padding: 0;
        }

        .container {
            width: 500px;
            margin: 60px auto;
            background: #ffffff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 5px 15px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 20px;
        }

        .btn_dashboard {
            display: inline-block;
            margin-bottom: 15px;
            padding: 8px 14px;
            background: #28a745;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-size: 14px;
        }

        .btn_dashboard:hover {
            background: #218838;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            font-weight: 600;
            font-size: 14px;
            display: block;
            margin-bottom: 5px;
            color: #333;
        }

        input, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 14px;
            transition: 0.2s;
        }

        input:focus, select:focus {
            border-color: #2c7be5;
            outline: none;
            box-shadow: 0 0 5px rgba(44,123,229,0.3);
        }

        .row {
            display: flex;
            gap: 10px;
        }

        .row .form-group {
            flex: 1;
        }

        button {
            width: 100%;
            margin-top: 15px;
            padding: 12px;
            background: #2c7be5;
            border: none;
            color: white;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background: #1a68d1;
        }

        .message {
            text-align: center;
            margin-bottom: 15px;
            font-weight: bold;
            color: #0b5ed7;
        }

        .form-title {
            text-align: center;
            margin-bottom: 10px;
            color: #555;
            font-size: 14px;
        }

    </style>
</head>
<body>

<div class="container">

    <a href="/admin" class="btn_dashboard">← Back to Admin</a>

    <h2>Feeds Registry</h2>
    <p class="form-title">Enter feed purchase details below</p>

    {% if message %}
        <div class="message">{{ message }}</div>
    {% endif %}

    <form method="POST" action="/feeds_registry">

        <!-- Date -->
        <div class="form-group">
            <label>Date Bought</label>
            <input type="date" name="todate" required>
        </div>

        <!-- Farm -->
        <div class="form-group">
            <label>Select Farm</label>
            <select name="farm_id" required>
                <option value="">-- Select Farm --</option>
                {% for farm in farms %}
                    <option value="{{ farm.id }}">{{ farm.name }}</option>
                {% endfor %}
            </select>
        </div>

        <!-- Feed Name -->
        <div class="form-group">
            <label>Feed Name</label>
            <input type="text" name="feed_name" placeholder="e.g. Dairy Meal, Layers Mash" required>
        </div>

        <!-- Quantity & Price in one row -->
        <div class="row">
            <div class="form-group">
                <label>Quantity</label>
                <input type="number" step="0.01" name="Quantity" placeholder="e.g. 50" required>
            </div>

            <div class="form-group">
                <label>Price (KSh)</label>
                <input type="number" step="0.01" name="Price" placeholder="e.g. 2500" required>
            </div>
        </div>

        <button type="submit">➕ Add Feed Record</button>

    </form>

</div>

</body>
</html>
