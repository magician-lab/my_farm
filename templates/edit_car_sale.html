<!DOCTYPE html>
<html>
<head>
    <title>Edit Sale</title>

    <style>
        body { font-family: Arial; background: #f4f6f9; padding: 20px; }

        form {
            max-width: 450px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
        }

        select, input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #007bff;
            color: white;
            border: none;
        }
    </style>
</head>
<body>

<h2>Edit Sale</h2>

<form method="POST">

    <select name="car_id">
        {% for car in cars %}
        <option value="{{ car.id }}" {% if car.id == sale.car_id %}selected{% endif %}>
            {{ car.plate_number }}
        </option>
        {% endfor %}
    </select>

    <input type="date" name="date" value="{{ sale.date }}">

    <select name="day_length">
        <option value="FULL" {% if sale.length == 'FULL' %}selected{% endif %}>Full</option>
        <option value="HALF" {% if sale.length == 'HALF' %}selected{% endif %}>Half</option>
    </select>

    <button type="submit">Update Sale</button>

</form>

</body>
</html>
