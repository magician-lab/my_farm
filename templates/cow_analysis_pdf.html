<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Cow Analysis Report</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            color: #333;
            padding: 20px;
        }

        .header {
            text-align: center;
            border-bottom: 2px solid #2e7d32;
            margin-bottom: 15px;
        }

        .header h1 {
            margin: 0;
            color: #2e7d32;
        }

        .sub-header {
            text-align: center;
            font-size: 16px;
            margin-bottom: 20px;
            color: #555;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: #2e7d32;
            color: white;
            padding: 10px;
            text-align: left;
        }

        td {
            padding: 10px;
            border-bottom: 1px solid #ddd;
        }

        tr:nth-child(even) {
            background: #f9f9f9;
        }

        .summary {
            margin-top: 20px;
            padding: 10px;
            background: #e8f5e9;
            border-left: 5px solid #2e7d32;
        }

        .footer {
            text-align: center;
            margin-top: 25px;
            font-size: 12px;
            color: #777;
        }

        .no {
            font-weight: bold;
            color: #2e7d32;
        }
    </style>
</head>

<body>

<div class="header">
    <h1>🐄 Cow Milk Analysis Report</h1>
</div>

<div class="sub-header">
    📅 {{ month_name }}
</div>

<table>
    <tr>
        <th>No</th>
        <th>Cow Name</th>
        <th>Total Milk (L)</th>
        <th>Average / Day (L)</th>
    </tr>

    {% for cow in cow_report %}
    <tr>
        <td class="no">{{ cow.no }}</td>
        <td>{{ cow.name }}</td>
        <td>{{ cow.total }}</td>
        <td>{{ cow.average }}</td>
    </tr>
    {% endfor %}
</table>

<div class="summary">
    <strong>Summary:</strong><br>
    Total cows analyzed: {{ cow_report|length }}
</div>

<div class="footer">
    Generated automatically by Farm Management System
</div>

</body>
</html>
